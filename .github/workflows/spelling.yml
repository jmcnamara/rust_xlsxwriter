name: Spelling - test spelling with Typos crate

permissions:
  contents: read

on:
  push:
  pull_request:

env:
  CLICOLOR: 1

jobs:
  spelling:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Actions Repository
      uses: actions/checkout@v4
    - name: Spell Check Repo
      uses: crate-ci/typos@v1.34.0
